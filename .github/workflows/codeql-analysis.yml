name: "CodeQL"

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '16 14 * * 6'

jobs:
  analyze:
    name: Analyze (CodeQL v2)
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'javascript' ]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # ✅ Init CodeQL v2
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v2
      with:
        languages: ${{ matrix.language }}
        # Optionnel : active plus de règles
        queries: security-extended

    # ⚠️ Pas nécessaire pour JavaScript (mais laissé safe)
    - name: Autobuild
      uses: github/codeql-action/autobuild@v2

    # ✅ Analyse CodeQL v2
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v2
